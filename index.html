<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta name="description" content="为宠托师提供互动式培训内容，降低学习阻力，帮助快速吸收知识，提升专业技能。">

    setTimeout(function() { resolve(false); }, 3000);
  } catch(e) { resolve(false); }

<style>
/* ===== CSS Variables & Theme ===== */
:root {
  --primary: #EE7C2B;
  --primary-light: #FFF0E5;
  --primary-dark: #C75C1A;
  --success: #52C41A;
  --success-light: #F0FFF4;
  --warning: #FAAD14;
  --warning-light: #FFFBE6;
  --danger: #E23636;
  --danger-light: #FFF2F0;
  --info: #4096FF;
  --info-light: #F0F7FF;
  --bg: #FFF9F5;
  --bg-card: #FFFFFF;
  --text: #2E251F;
  --text-secondary: #6B5E55;
  --text-muted: #9B8E85;
  --border: #F0E8E0;
  --border-active: #EE7C2B;
  --shadow-sm: 0 1px 3px rgba(46,37,31,0.06);
  --shadow-md: 0 4px 12px rgba(46,37,31,0.08);
  --shadow-lg: 0 8px 24px rgba(46,37,31,0.12);
  --radius-sm: 8px;
  --radius: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --font-xs: 0.75rem;
  --font-sm: 0.8125rem;
  --font-base: 0.9375rem;
  --font-md: 1.0625rem;
  --font-lg: 1.25rem;
  --font-xl: 1.5rem;
  --font-2xl: 2rem;
  --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
  --max-width: 480px;
}

/* ===== Base Styles ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  scroll-behavior: smooth;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
  display: flex;
  justify-content: center;
}

.app-container {
  width: 100%;
  max-width: var(--max-width);
  min-height: 100vh;
  position: relative;
}

/* ===== Top Progress Bar ===== */
.top-progress {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  padding: 10px 16px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.progress-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 8px;
}

.progress-title {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: var(--font-sm);
  font-weight: 600;
  color: var(--text);
}

.progress-title .icon { font-size: 1.1rem; }

.progress-stats {
  font-size: var(--font-xs);
  color: var(--text-muted);
  font-weight: 500;
}

.progress-stats strong {
  color: var(--primary);
  font-size: var(--font-sm);
}

.progress-bar-track {
  height: 6px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #FFA940, #EE7C2B);
  border-radius: 3px;
  transition: width 0.5s ease;
  width: 0%;
}

.progress-label {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 6px;
  font-size: var(--font-xs);
  color: var(--text-secondary);
}

.progress-label .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--success);
  animation: pulse-dot 2s infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ===== Page Views ===== */
.page-view {
  display: none;
  padding: 0 16px 120px;
}

.page-view.active { display: block; }

/* ===== Home Page ===== */
.home-hero {
  text-align: center;
  padding: 24px 0 20px;
}

.hero-logo {
  width: 80px;
  height: 80px;
  border-radius: var(--radius-xl);
  background: linear-gradient(135deg, #FFD591, #FFA940);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  margin-bottom: 16px;
  box-shadow: 0 8px 24px rgba(238,124,43,0.25);
}

.hero-title {
  font-size: var(--font-2xl);
  font-weight: 800;
  background: linear-gradient(135deg, #C75C1A, #EE7C2B);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 0.5px;
}

.hero-subtitle {
  font-size: var(--font-md);
  color: var(--text-secondary);
  margin-top: 4px;
  font-weight: 500;
}

.hero-desc {
  font-size: var(--font-sm);
  color: var(--text-muted);
  margin-top: 4px;
}

/* ===== Learning Progress Section ===== */
.learning-progress-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}

.learning-progress-card .header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.learning-progress-card .header h3 {
  font-size: var(--font-md);
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 6px;
}

.learning-progress-card .stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 14px;
}

.stat-item {
  text-align: center;
  padding: 10px 6px;
  background: var(--primary-light);
  border-radius: var(--radius);
}

.stat-item .stat-num {
  font-size: var(--font-lg);
  font-weight: 700;
  color: var(--primary-dark);
}

.stat-item .stat-label {
  font-size: var(--font-xs);
  color: var(--text-secondary);
  margin-top: 2px;
}

.encourage-text {
  text-align: center;
  font-size: var(--font-sm);
  color: var(--primary);
  font-weight: 600;
  padding: 10px;
  background: var(--primary-light);
  border-radius: var(--radius);
}

/* ===== Chapter List ===== */
.section-title {
  font-size: var(--font-lg);
  font-weight: 700;
  margin: 20px 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.chapter-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.chapter-card {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px;
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}

.chapter-card:hover {
  border-color: var(--border-active);
  box-shadow: var(--shadow-md);
  transform: translateY(-1px);
}

.chapter-card:active {
  transform: scale(0.985);
}

.chapter-card.completed {
  border-color: #B7EB8F;
  background: #FAFFFA;
}

.chapter-card.completed::after {
  content: '✓';
  position: absolute;
  right: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--success);
  font-weight: 700;
  font-size: 1.1rem;
}

.chapter-num {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  background: var(--primary-light);
  color: var(--primary-dark);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: var(--font-md);
  flex-shrink: 0;
  transition: all var(--transition);
}

.chapter-card.completed .chapter-num {
  background: var(--success-light);
  color: var(--success);
}

.chapter-info { flex: 1; min-width: 0; }

.chapter-info h4 {
  font-size: var(--font-base);
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chapter-info p {
  font-size: var(--font-xs);
  color: var(--text-muted);
  margin-top: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.chapter-arrow {
  color: var(--text-muted);
  font-size: 1rem;
}

/* ===== Tips Card ===== */
.tips-card {
  background: linear-gradient(135deg, #FFF7E6, #FFFBE6);
  border: 1px solid #FFE58F;
  border-radius: var(--radius-lg);
  padding: 18px;
  margin-top: 16px;
}

.tips-card h3 {
  font-size: var(--font-base);
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.tips-card ul {
  list-style: none;
  padding: 0;
}

.tips-card li {
  font-size: var(--font-sm);
  color: var(--text-secondary);
  padding: 5px 0;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.tips-card li::before {
  content: '💡';
  flex-shrink: 0;
}

/* ===== Chapter Content Page ===== */
.chapter-header {
  padding: 20px 0 16px;
  position: relative;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--primary);
  font-size: var(--font-sm);
  font-weight: 600;
  cursor: pointer;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  background: var(--primary-light);
  border: none;
  margin-bottom: 14px;
  transition: all var(--transition);
}

.back-btn:hover { background: #FFE4CC; }
.back-btn:active { transform: scale(0.96); }

.chapter-icon {
  font-size: 2.5rem;
  display: block;
  margin-bottom: 10px;
}

.chapter-page-title {
  font-size: var(--font-xl);
  font-weight: 800;
  color: var(--text);
  line-height: 1.3;
}

.chapter-page-desc {
  font-size: var(--font-sm);
  color: var(--text-muted);
  margin-top: 6px;
  line-height: 1.5;
}

/* ===== Content Cards ===== */
.content-card {
  background: var(--bg-card);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 18px;
  margin-bottom: 14px;
  box-shadow: var(--shadow-sm);
}

.content-card h3 {
  font-size: var(--font-md);
  font-weight: 700;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.content-card h4 {
  font-size: var(--font-base);
  font-weight: 600;
  margin: 12px 0 6px;
}

.content-card p, .content-card li {
  font-size: var(--font-sm);
  color: var(--text-secondary);
  line-height: 1.65;
}

.content-card ul {
  list-style: none;
  padding: 0;
}

.content-card ul li {
  padding: 4px 0;
  padding-left: 16px;
  position: relative;
}

.content-card ul li::before {
  content: '';
  position: absolute;
  left: 0;
  top: 10px;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--primary);
}

/* ===== Highlight Cards ===== */
.highlight-card {
  background: linear-gradient(135deg, var(--primary-light), #FFF5EC);
  border: 1px solid #FFD5A8;
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 14px;
}

.highlight-card.warning {
  background: var(--warning-light);
  border-color: #FFE58F;
}

.highlight-card.danger {
  background: var(--danger-light);
  border-color: #FFBFB8;
}

.highlight-card.info {
  background: var(--info-light);
  border-color: #ADC6FF;
}

.highlight-card.success {
  background: var(--success-light);
  border-color: #B7EB8F;
}

.highlight-card h4 {
  font-size: var(--font-base);
  font-weight: 600;
  margin-bottom: 6px;
}

.highlight-card p, .highlight-card li {
  font-size: var(--font-sm);
  line-height: 1.6;
}

/* ===== Service Comparison Grid ===== */
.compare-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 10px 0;
}

.compare-item {
  padding: 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  text-align: center;
  background: var(--bg-card);
}

.compare-item.active {
  border-color: var(--border-active);
  background: var(--primary-light);
}

.compare-item .compare-icon {
  font-size: 1.5rem;
  margin-bottom: 6px;
}

.compare-item .compare-title {
  font-weight: 600;
  font-size: var(--font-sm);
}

.compare-item .compare-detail {
  font-size: var(--font-xs);
  color: var(--text-muted);
  margin-top: 4px;
}

/* ===== Price Table ===== */
.price-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin: 10px 0;
}

.price-card {
  text-align: center;
  padding: 16px 10px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
}

.price-card .pet-icon {
  font-size: 1.8rem;
  margin-bottom: 6px;
}

.price-card .price-type {
  font-size: var(--font-xs);
  color: var(--text-muted);
}

.price-card .price-amount {
  font-size: var(--font-lg);
  font-weight: 800;
  color: var(--primary-dark);
  margin: 4px 0;
}

.price-card .price-note {
  font-size: var(--font-xs);
  color: var(--text-muted);
}

/* ===== Checklist ===== */
.checklist {
  list-style: none !important;
  padding: 0 !important;
}

.checklist li {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 0 !important;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  padding-left: 0 !important;
  transition: all var(--transition);
}

.checklist li::before { display: none !important; }

.checklist li:last-child { border-bottom: none; }

.checkbox {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  border: 2px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
  font-size: 0.7rem;
  color: transparent;
}

.checklist li.checked .checkbox {
  background: var(--success);
  border-color: var(--success);
  color: white;
}

.checklist li.checked .checklist-text {
  text-decoration: line-through;
  color: var(--text-muted);
}

.checklist-text {
  font-size: var(--font-sm);
  flex: 1;
  transition: all var(--transition);
}

/* ===== Rule Cards ===== */
.rule-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 14px;
  margin-bottom: 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--bg-card);
}

.rule-card.red-line {
  border-left: 4px solid var(--danger);
  background: #FFFBFB;
}

.rule-card.severe {
  border-left: 4px solid var(--warning);
}

.rule-card.minor {
  border-left: 4px solid var(--info);
}

.rule-icon {
  font-size: 1.3rem;
  flex-shrink: 0;
}

.rule-content { flex: 1; }

.rule-content h4 {
  font-size: var(--font-sm);
  font-weight: 600;
  margin-bottom: 2px;
}

.rule-content p {
  font-size: var(--font-xs);
  color: var(--text-muted);
  line-height: 1.5;
}

.rule-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 100px;
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.rule-badge.danger {
  background: var(--danger-light);
  color: var(--danger);
}

.rule-badge.warning {
  background: var(--warning-light);
  color: #AD6800;
}

.rule-badge.info {
  background: var(--info-light);
  color: #1D39C4;
}

/* ===== Step List ===== */
.step-list {
  counter-reset: step;
  list-style: none !important;
  padding: 0 !important;
}

.step-list li {
  counter-increment: step;
  padding: 12px 0 12px 36px !important;
  position: relative;
  border-bottom: 1px solid var(--border);
}

.step-list li::before {
  display: flex !important;
  align-items: center;
  justify-content: center;
  position: absolute;
  left: 0;
  top: 12px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--primary) !important;
  color: white !important;
  content: counter(step) !important;
  font-size: var(--font-xs) !important;
  font-weight: 700 !important;
}

.step-list li:last-child { border-bottom: none; }

/* ===== Message Templates ===== */
.template-card {
  background: #F8F8F6;
  border-radius: var(--radius);
  padding: 14px;
  margin: 8px 0;
  position: relative;
}

.template-card .template-label {
  font-size: var(--font-xs);
  color: var(--text-muted);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.template-card .template-text {
  font-size: var(--font-sm);
  color: var(--text-secondary);
  line-height: 1.6;
  font-style: italic;
}

.copy-btn {
  position: absolute;
  top: 10px;
  right: 10px;
  padding: 4px 10px;
  border-radius: 100px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  font-size: var(--font-xs);
  color: var(--primary);
  cursor: pointer;
  transition: all var(--transition);
}

.copy-btn:hover { background: var(--primary-light); }
.copy-btn.copied { background: var(--success); color: white; border-color: var(--success); }

/* ===== Quiz ===== */
.quiz-card {
  background: var(--bg-card);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  padding: 20px;
  margin-bottom: 14px;
}

.quiz-progress {
  font-size: var(--font-xs);
  color: var(--text-muted);
  margin-bottom: 12px;
  font-weight: 500;
}

.quiz-question {
  font-size: var(--font-md);
  font-weight: 600;
  color: var(--text);
  margin-bottom: 16px;
  line-height: 1.5;
}

.quiz-options {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.quiz-option {
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 2px solid var(--border);
  background: var(--bg-card);
  cursor: pointer;
  transition: all var(--transition);
  text-align: left;
  font-size: var(--font-sm);
  display: flex;
  align-items: center;
  gap: 10px;
}

.quiz-option:hover {
  border-color: var(--primary);
  background: var(--primary-light);
}

.quiz-option.selected {
  border-color: var(--primary);
  background: var(--primary-light);
  font-weight: 600;
}

.quiz-option.correct {
  border-color: var(--success) !important;
  background: var(--success-light) !important;
  color: #135200 !important;
}

.quiz-option.wrong {
  border-color: var(--danger) !important;
  background: var(--danger-light) !important;
  color: #820014 !important;
}

.quiz-option .option-letter {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: var(--border);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
  font-size: var(--font-xs);
  flex-shrink: 0;
}

.quiz-option.correct .option-letter {
  background: var(--success);
  color: white;
}

.quiz-option.wrong .option-letter {
  background: var(--danger);
  color: white;
}

.quiz-feedback {
  margin-top: 14px;
  padding: 12px 16px;
  border-radius: var(--radius-sm);
  font-size: var(--font-sm);
  font-weight: 500;
  display: none;
}

.quiz-feedback.show { display: block; }

.quiz-feedback.correct {
  background: var(--success-light);
  color: #135200;
  border: 1px solid #B7EB8F;
}

.quiz-feedback.wrong {
  background: var(--danger-light);
  color: #820014;
  border: 1px solid #FFBFB8;
}

/* ===== Bottom Navigation ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: var(--max-width);
  background: var(--bg-card);
  border-top: 1px solid var(--border);
  padding: 14px 16px;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
  display: flex;
  gap: 10px;
  z-index: 100;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}

.btn {
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: var(--font-base);
  font-weight: 600;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
  display: inline-flex;

// ===== STATE =====
const STORAGE_KEY = 'pet_training_progress';
let state = loadState();
let currentChapter = null;
let currentQuizIndex = 0;
let quizAnswers = [];
let quizDone = false;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      return {
        completedChapters: parsed.completedChapters || [],
        chapterChecklists: parsed.chapterChecklists || {},
        quizScore: parsed.quizScore || 0,
        quizDone: parsed.quizDone || false
      };
    }
  } catch (e) {}
  return { completedChapters: [], chapterChecklists: {}, quizScore: 0, quizDone: false };
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch (e) {}
}

// ===== NAVIGATION =====
function showPage(pageId) {
  document.querySelectorAll('.page-view').forEach(p => p.classList.remove('active'));
  const page = document.getElementById('page-' + pageId);
  if (page) page.classList.add('active');
  window.scrollTo(0, 0);
  updateBottomNav(pageId);
}

function updateBottomNav(pageId) {
  const prevBtn = document.getElementById('btnPrev');
  const nextBtn = document.getElementById('btnNext');

  if (pageId === 'home') {
    prevBtn.style.display = 'none';
    nextBtn.textContent = '开始学习 →';
    nextBtn.className = 'btn btn-primary';
    nextBtn.onclick = () => goToChapter(1);
  } else if (pageId === 'chapter' && currentChapter) {
    prevBtn.style.display = currentChapter > 1 ? '' : 'none';
    prevBtn.textContent = '← 上一章';
    prevBtn.className = 'btn btn-secondary';
    prevBtn.onclick = () => goToChapter(currentChapter - 1);

    if (currentChapter < 10) {
      nextBtn.textContent = '下一章 →';
      nextBtn.className = 'btn btn-primary';
      nextBtn.onclick = () => goToChapter(currentChapter + 1);
    } else {
      nextBtn.textContent = '🎉 完成培训';
      nextBtn.className = 'btn btn-primary';
      nextBtn.onclick = () => goToChapter(10);
    }
    nextBtn.style.display = '';
  } else if (pageId === 'quiz') {
    prevBtn.style.display = 'none';
    nextBtn.style.display = 'none';
  } else if (pageId === 'completion') {
    prevBtn.style.display = '';
    prevBtn.textContent = '← 返回首页';
    prevBtn.className = 'btn btn-secondary';
    prevBtn.onclick = () => showHome();
    nextBtn.style.display = '';
    nextBtn.textContent = '🔄 重新学习';
    nextBtn.className = 'btn btn-outline';
    nextBtn.onclick = resetAll;
  }
}

function goToChapter(num) {
  currentChapter = num;
  const ch = courseData.chapters[num - 1];
  document.getElementById('page-chapter').innerHTML = ch.content;
  showPage('chapter');
  restoreChecklistState(num);
  updateProgress();

  // Update progress for specific chapter checklists
  setTimeout(() => updateChChecklistProgress(num), 100);
}

function showHome() {
  currentChapter = null;
  showPage('home');
  renderHome();
  updateProgress();
}

// ===== CHECKLIST =====
function toggleCheck(el, chapterKey) {
  el.classList.toggle('checked');
  saveChecklistState(chapterKey);
  updateChChecklistProgress(chapterKey);

  // Check if all checklists for this chapter are complete
  checkChapterCompletion(chapterKey);
}

function saveChecklistState(chapterKey) {
  const chapterId = typeof chapterKey === 'number' ? chapterKey : currentChapter;
  const container = document.querySelector(`[data-chapter="${chapterKey}"]`);
  if (!container) return;

  const items = container.querySelectorAll('li');
  const checked = [];
  items.forEach((li, i) => {
    if (li.classList.contains('checked')) checked.push(i);
  });

  if (!state.chapterChecklists) state.chapterChecklists = {};
  state.chapterChecklists[chapterKey] = checked;
  saveState();
}

function restoreChecklistState(chapterNum) {
  setTimeout(() => {
    // Restore all checklists on the page
    document.querySelectorAll('.checklist').forEach(list => {
      const key = list.getAttribute('data-chapter');
      if (!key) return;
      const checked = state.chapterChecklists?.[key] || [];
      const items = list.querySelectorAll('li');
      items.forEach((li, i) => {
        if (checked.includes(i)) li.classList.add('checked');
      });
      updateChChecklistProgress(key);
    });
  }, 200);
}

function updateChChecklistProgress(key) {
  const container = document.querySelector(`[data-chapter="${key}"]`);
  if (!container) return;

  const items = container.querySelectorAll('li');
  const checked = container.querySelectorAll('li.checked');
  const total = items.length;
  const done = checked.length;

  // Update progress text
  const progressEl = document.getElementById(`ch${key}-progress`);
  if (progressEl) progressEl.textContent = `${done}/${total}`;

  if (typeof key === 'number') {
    const ch9Progress = document.getElementById('ch9-progress');
    if (ch9Progress) ch9Progress.textContent = `${done}/${total}`;
  }

  // Check if chapter should be marked complete
  if (total > 0 && done === total) {
    checkChapterCompletion(key);
  }
}

function checkChapterCompletion(chapterKey) {
  const chapterNum = typeof chapterKey === 'number' ? chapterKey : currentChapter;
  if (!chapterNum) return;

  // Check all checklists in this chapter
  const allChecklists = document.querySelectorAll(`.checklist`);
  let allChecked = true;
  let hasAny = false;

  allChecklists.forEach(list => {
    const key = list.getAttribute('data-chapter');
    if (!key) return;
    // For chapter-specific checklists
    const keyNum = parseInt(key);
    const chStr = String(chapterNum);

    // Check if this checklist belongs to this chapter
    if (key === chStr || key.startsWith(chStr)) {
      hasAny = true;
      const items = list.querySelectorAll('li');
      const checked = list.querySelectorAll('li.checked');
      if (checked.length < items.length) allChecked = false;
    }
  });

  if (hasAny && allChecked && !state.completedChapters.includes(chapterNum)) {
    state.completedChapters.push(chapterNum);
    saveState();
    updateProgress();
    showToast(`✅ 第 ${chapterNum} 章已完成！`);
    if (currentChapter === chapterNum && currentChapter < 10) {
      setTimeout(() => {
        const nextBtn = document.getElementById('btnNext');
        if (nextBtn) nextBtn.textContent = '✅ 已完成，下一章 →';
      }, 100);
    }
  }
}

// ===== QUIZ =====
function startQuiz() {
  currentQuizIndex = 0;
  quizAnswers = new Array(courseData.quiz.length).fill(null);
  showPage('quiz');
  renderQuizQuestion();
}

function renderQuizQuestion() {
  const quiz = courseData.quiz;
  if (currentQuizIndex >= quiz.length) {
    finishQuiz();
    return;
  }

  const q = quiz[currentQuizIndex];
  const optionsHtml = q.options.map((opt, i) => {
    let cls = 'quiz-option';
    if (quizAnswers[currentQuizIndex] !== null) {
      if (i === q.answer) cls += ' correct';
      else if (i === quizAnswers[currentQuizIndex] && i !== q.answer) cls += ' wrong';
    }
    const letters = ['A', 'B', 'C', 'D'];
    return `
      <button class="${cls}" onclick="answerQuiz(${i})" ${quizAnswers[currentQuizIndex] !== null ? 'disabled' : ''}>
        <span class="option-letter">${letters[i]}</span>
        <span>${opt}</span>
      </button>
    `;
  }).join('');

  let feedbackHtml = '';
  if (quizAnswers[currentQuizIndex] !== null) {
    const isCorrect = quizAnswers[currentQuizIndex] === q.answer;
    feedbackHtml = `
      <div class="quiz-feedback show ${isCorrect ? 'correct' : 'wrong'}">
        ${isCorrect ? '✅ 回答正确！' : '❌ 回答错误，正确答案是 ' + (['A','B','C','D'][q.answer]) + '. ' + q.options[q.answer]}
      </div>
      <button class="btn btn-primary" onclick="nextQuizQuestion()" style="width:100%;margin-top:12px;">
        ${currentQuizIndex < quiz.length - 1 ? '下一题 →' : '查看结果'}
      </button>
    `;
  }

  document.getElementById('page-quiz').innerHTML = `
    <div class="chapter-header" style="padding-top:8px;">
      <button class="back-btn" onclick="goToChapter(10)">← 返回课程</button>
      <h2 style="font-size:var(--font-lg);font-weight:700;">📝 规则自测小测验</h2>
    </div>
    <div class="quiz-card">
      <div class="quiz-progress">第 ${currentQuizIndex + 1} / ${quiz.length} 题</div>
      <div class="quiz-question">${currentQuizIndex + 1}. ${q.q}</div>
      <div class="quiz-options">${optionsHtml}</div>
      ${feedbackHtml}
    </div>
  `;
}

function answerQuiz(index) {
  if (quizAnswers[currentQuizIndex] !== null) return;
  quizAnswers[currentQuizIndex] = index;
  renderQuizQuestion();
}

function nextQuizQuestion() {
  currentQuizIndex++;
  if (currentQuizIndex >= courseData.quiz.length) {
    finishQuiz();
  } else {
    renderQuizQuestion();
  }
}

function finishQuiz() {
  const quiz = courseData.quiz;
  let score = 0;
  quizAnswers.forEach((ans, i) => {
    if (ans === quiz[i].answer) score += 20;
  });

  state.quizScore = score;
  state.quizDone = true;
  saveState();
  quizDone = true;

  // Make sure chapter 10 is marked complete
  if (!state.completedChapters.includes(10)) {
    state.completedChapters.push(10);
    saveState();
  }

  showCompletion();
}

      ${alreadySubmitted ? `
      <div class="submit-status success show">✅ 您的认证信息已成功提交至宠宠它平台！</div>
      ` : `
      <button class="btn btn-primary" onclick="submitCertification()" style="width:100%;" id="submitBtn">
        📤 提交认证数据
      </button>
      `}

      <div class="submit-status" id="submitStatus"></div>
    </div>
    ` : ''}

    <div class="highlight-card" style="text-align:center;">
      <p style="font-style:italic;color:var(--text-secondary);">"感谢您观看，欢迎您加入【宠宠它】，用爱与责任呵护每一份信赖！"</p>
      <p style="font-weight:600;color:var(--primary);margin-top:6px;">—— 宠宠它团队</p>
    </div>

    <div style="text-align:center;margin-top:20px;">
      <p style="font-size:var(--font-sm);color:var(--text-secondary);margin-bottom:10px;">准备好开始接单了吗？</p>
      <p style="font-size:var(--font-base);font-weight:600;">打开宠宠它小程序，开启您的宠托师之旅！🐾</p>
    </div>
  `;

  updateProgress();
}

// ===== UTILS =====
function updateProgress() {
  const completed = state.completedChapters.length;
  const total = courseData.chapters.length;
  const pct = Math.round((completed / total) * 100);

  document.getElementById('topCompleted').textContent = completed;
  document.getElementById('progressBar').style.width = pct + '%';

  let label;
  if (pct === 0) label = '开始你的宠托师之旅吧！';
  else if (pct < 30) label = '好的开始是成功的一半 💪';
  else if (pct < 60) label = '学得不错，继续保持！📚';
  else if (pct < 100) label = '胜利在望，加油！🔥';
  else label = '全部完成！太棒了！🏆';

  document.getElementById('progressLabel').textContent = label;

  // Update progress bar color
  const bar = document.getElementById('progressBar');
  if (pct === 100) {
    bar.style.background = 'linear-gradient(90deg, #52C41A, #73D13D)';
  } else {
    bar.style.background = 'linear-gradient(90deg, #FFA940, #EE7C2B)';
  }
}

function copyTemplate(btn, text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '已复制!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '复制';
        btn.classList.remove('copied');
      }, 1500);
    });
  }
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);
}

function resetAll() {
  if (confirm('确定要重置所有学习进度吗？此操作不可恢复！')) {
    state = { completedChapters: [], chapterChecklists: {}, quizScore: 0, quizDone: false };
    saveState();
    quizDone = false;
    showHome();
    showToast('🔄 进度已重置');
  }
}

// ===== SUBMIT TO BITABLE (Direct via JSSDK / fetch / Form fallback) =====
const BASE_TOKEN = 'OhW6bKTqja59ums3Y6Pc9madnsb';
const TABLE_ID = 'tblN1bXLKi7ofnrj';
const FORM_VIEW_ID = 'vewG4iGZKX';
const FORM_URL = `https://ow8yrg5ey2n.feishu.cn/base/${BASE_TOKEN}?table=${TABLE_ID}&view=${FORM_VIEW_ID}`;

function submitCertification() {
  const nameInput = document.getElementById('inputName');
  const phoneInput = document.getElementById('inputPhone');
  const nameErr = document.getElementById('nameError');
  const phoneErr = document.getElementById('phoneError');
  const submitBtn = document.getElementById('submitBtn');
  const statusEl = document.getElementById('submitStatus');

  let valid = true;

  if (!nameInput.value.trim()) {
    nameInput.classList.add('error');
    nameErr.classList.add('show');
    valid = false;
  } else {
    nameInput.classList.remove('error');
    nameErr.classList.remove('show');
  }

  const phone = phoneInput.value.trim();
  if (!phone || !/^1[3-9]\d{9}$/.test(phone)) {
    phoneInput.classList.add('error');
    phoneErr.classList.add('show');
    if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
      phoneErr.textContent = '请输入正确的11位手机号';
    }
    valid = false;
  } else {
    phoneInput.classList.remove('error');
    phoneErr.classList.remove('show');
  }

  if (!valid) return;

  submitBtn.disabled = true;
  submitBtn.textContent = '⏳ 正在提交...';
  statusEl.className = 'submit-status loading show';
  statusEl.textContent = '正在将您的培训数据同步至认证系统...';

  const completed = state.completedChapters.length;
  const total = courseData.chapters.length;
  const checklistSummary = Object.entries(state.chapterChecklists || {}).map(([k, v]) => {
    const chNum = parseInt(k);
    const ch = courseData.chapters[chNum - 1];
    if (ch && v && v.length > 0) return `${ch.title}: ${v.length}项`;
    return null;
  }).filter(Boolean).join('; ');
  const progressStr = `章节${completed}/${total} | 测验${state.quizScore}分 | ${checklistSummary}`;
  const now = new Date();
  const timeStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

  const userData = {
    name: nameInput.value.trim(),
    phone: phone,
    score: state.quizScore,
    time: timeStr,
    progress: progressStr
  };

  tryDirectSubmit(userData).then(result => {
    if (result.ok) {
      statusEl.className = 'submit-status success show';
      statusEl.innerHTML = '✅ 认证数据已成功提交至多维表格！';
      submitBtn.style.display = 'none';
      state.submitted = true;
      state.petSitterName = userData.name;
      state.petSitterPhone = userData.phone;
      saveState();
    } else {
      throw new Error(result.error || '提交失败');
    }
  }).catch(err => {
    console.log('Direct submit unavailable, showing form fallback:', err.message);
    showFormFallback(userData);
  });
}

async function tryDirectSubmit(data) {
  // Method 1: Feishu JSSDK tt.request (works in Feishu client)
  var jssdkReady = await ttReady;
  if (jssdkReady && typeof tt !== 'undefined' && tt.request) {
    try {
      var resp = await new Promise(function(resolve, reject) {
        tt.request({
          url: 'https://open.feishu.cn/open-apis/bitable/v1/apps/' + BASE_TOKEN + '/tables/' + TABLE_ID + '/records',
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          data: JSON.stringify({
            fields: {
              '姓名': data.name,
              '手机号': data.phone,
              '培训得分': data.score,
              '完成时间': Date.now(),
              '学习进度': data.progress
            }
          }),
          success: function(res) { resolve(JSON.parse(res.data || '{}')); },
          fail: function(err) { reject(err); }
        });
      });
      if (resp.code === 0) return { ok: true, recordId: resp.data?.record?.record_id };
      return { ok: false, error: 'API: ' + (resp.msg || resp.code) };
    } catch (e) {
      console.log('JSSDK failed:', e.message);
    }
  }

  // Method 2: Backend proxy (always available while tunnel runs)
  try {
    var resp = await fetch('https://green-firefox-89.loca.lt/api/submit-training', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: data.name,
        phone: data.phone,
        score: data.score,
        progress: data.progress
      })
    });
    if (resp.ok) {
      var json = await resp.json();
      if (json.ok) return { ok: true, recordId: json.recordIds?.[0] };
      return { ok: false, error: json.error || 'Backend error' };
    }
  } catch (e) {
    console.log('Backend proxy failed:', e.message);
  }

  return { ok: false, error: '无法连接，请使用表单' };
}

function showFormFallback(data) {
  const statusEl = document.getElementById('submitStatus');
  const submitBtn = document.getElementById('submitBtn');

  statusEl.className = 'submit-status loading show';
  statusEl.innerHTML = `
    <div style="text-align:left;line-height:1.8;">
      <p style="font-weight:700;margin-bottom:8px;">📋 请通过飞书表单完成认证：</p>
      <p>1️⃣ <a href="${FORM_URL}" target="_blank" style="color:var(--primary);font-weight:600;">👉 点击打开认证表单</a></p>
      <p style="margin-top:8px;">2️⃣ 在表单中填写（可复制下方内容）：</p>
      <div style="background:#f8f8f6;padding:10px;border-radius:8px;margin:8px 0;font-size:var(--font-sm);">
        <p>👤 姓名：<strong>${data.name}</strong> <a onclick="copyText('${data.name}')" style="color:var(--primary);font-size:var(--font-xs);cursor:pointer;">[复制]</a></p>
        <p>📱 手机号：<strong>${data.phone}</strong> <a onclick="copyText('${data.phone}')" style="color:var(--primary);font-size:var(--font-xs);cursor:pointer;">[复制]</a></p>
        <p>📊 培训得分：<strong>${data.score}分</strong> <a onclick="copyText('${data.score}')" style="color:var(--primary);font-size:var(--font-xs);cursor:pointer;">[复制]</a></p>
        <p>📝 学习进度：<strong>${data.progress}</strong> <a onclick="copyText('${data.progress}')" style="color:var(--primary);font-size:var(--font-xs);cursor:pointer;">[复制]</a></p>
      </div>
      <p>3️⃣ 提交后数据自动写入认证系统 ✅</p>
    </div>
  `;
  submitBtn.textContent = '🔄 重试直连提交';
  submitBtn.disabled = false;
  submitBtn.onclick = submitCertification;
}

function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(String(text)).then(() => showToast('已复制！'));
  }
}
